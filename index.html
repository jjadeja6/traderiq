<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraderIQ - Crypto Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0d1117;
color:white;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #30363d;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #30363d;
}

.green{color:#00ff9c;}
.red{color:#ff4d4d;}

button{
padding:10px 15px;
border:none;
background:#238636;
color:white;
border-radius:6px;
cursor:pointer;
}

.news{
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
<h1>TraderIQ 🚀</h1>
<p>Live Crypto Signals & Market Dashboard</p>
<button onclick="toggleTheme()">Toggle Theme</button>
</header>

<div class="container">

<div class="card">
<h2>BTC Live Chart</h2>

<div class="tradingview-widget-container">
<div id="tradingview_btc"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
container_id: "tradingview_btc",
width:"100%",
height:400,
symbol:"BINANCE:BTCUSDT",
interval:"60",
theme:"dark",
style:"1",
locale:"en"
});
</script>

</div>
</div>

<div class="card">
<h2>Fear & Greed Index</h2>
<div id="fear"></div>
</div>

<div class="card">
<h2>Top Cryptos</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Price</th>
<th>24h Change</th>
<th>Market Cap</th>
</tr>
</thead>

<tbody id="cryptoTable"></tbody>

</table>
</div>

<div class="card">
<h2>Top Gainers</h2>
<div id="gainers"></div>
</div>

<div class="card">
<h2>Crypto News</h2>
<div id="news"></div>
</div>

</div>

<script>

async function loadCrypto(){

const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false&price_change_percentage=24h");

const data = await res.json();

let html="";

data.forEach(c=>{

let color=c.price_change_percentage_24h>0?"green":"red";

html+=`
<tr>
<td>${c.name}</td>
<td>$${c.current_price}</td>
<td class="${color}">
${c.price_change_percentage_24h.toFixed(2)}%
</td>
<td>$${(c.market_cap/1e9).toFixed(2)}B</td>
</tr>
`;

});

document.getElementById("cryptoTable").innerHTML=html;

}

loadCrypto();

async function loadFear(){

const res=await fetch("https://api.alternative.me/fng/");
const data=await res.json();

document.getElementById("fear").innerHTML=
data.data[0].value+" - "+data.data[0].value_classification;

}

loadFear();

async function loadNews(){

const res=await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");
const data=await res.json();

let html="";

data.Data.slice(0,5).forEach(n=>{

html+=`
<div class="news">
<a href="${n.url}" target="_blank">${n.title}</a>
</div>
`;

});

document.getElementById("news").innerHTML=html;

}

loadNews();

function toggleTheme(){

if(document.body.style.background=="white"){

document.body.style.background="#0d1117";
document.body.style.color="white";

}else{

document.body.style.background="white";
document.body.style.color="black";

}

}

</script>

</body>
</html>
