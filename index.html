<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraderIQ Pro</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0d1117;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#161b22;
border-bottom:1px solid #30363d;
}

nav h1{
color:#58a6ff;
margin:0;
}

nav a{
color:#c9d1d9;
margin-left:20px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
border:1px solid #30363d;
}

.card h3{
margin:0;
font-size:14px;
color:#8b949e;
}

.card p{
font-size:24px;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#161b22;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #30363d;
text-align:left;
}

th{
color:#58a6ff;
}

.green{color:#3fb950;}
.red{color:#f85149;}

.section{
margin-top:40px;
}

.chart{
background:#161b22;
padding:20px;
border-radius:10px;
border:1px solid #30363d;
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
color:#8b949e;
}

</style>

</head>

<body>

<nav>
<h1>TraderIQ</h1>

<div>
<a href="#">Markets</a>
<a href="#">Charts</a>
<a href="#">News</a>
</div>

</nav>

<div class="container">

<div class="cards">

<div class="card">
<h3>BTC Price</h3>
<p id="btc">Loading...</p>
</div>

<div class="card">
<h3>ETH Price</h3>
<p id="eth">Loading...</p>
</div>

<div class="card">
<h3>Total Market Cap</h3>
<p id="cap">Loading...</p>
</div>

<div class="card">
<h3>24h Volume</h3>
<p id="vol">Loading...</p>
</div>

</div>

<div class="section">

<h2>Top Cryptocurrencies</h2>

<table>

<thead>

<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h</th>
<th>Market Cap</th>
</tr>

</thead>

<tbody id="cryptoTable"></tbody>

</table>

</div>

<div class="section chart">

<h2>BTC Live Chart</h2>

<div id="tradingview_btc"></div>

</div>

</div>

<footer>
TraderIQ Pro Crypto Dashboard
</footer>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
container_id: "tradingview_btc",
width:"100%",
height:450,
symbol:"BINANCE:BTCUSDT",
interval:"60",
theme:"dark",
style:"1",
locale:"en"
})

async function loadCrypto(){

const res = await fetch(
"https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=24h"
)

const data = await res.json()

let html=""

data.forEach((c,i)=>{

let color=c.price_change_percentage_24h>0?"green":"red"

html+=`
<tr>
<td>${i+1}</td>
<td>${c.name}</td>
<td>$${c.current_price}</td>
<td class="${color}">
${c.price_change_percentage_24h.toFixed(2)}%
</td>
<td>$${(c.market_cap/1e9).toFixed(2)}B</td>
</tr>
`

})

document.getElementById("cryptoTable").innerHTML=html

document.getElementById("btc").innerText="$"+data[0].current_price
document.getElementById("eth").innerText="$"+data[1].current_price

}

loadCrypto()

async function market(){

const res=await fetch("https://api.coingecko.com/api/v3/global")

const data=await res.json()

document.getElementById("cap").innerText=
"$"+(data.data.total_market_cap.usd/1e12).toFixed(2)+"T"

document.getElementById("vol").innerText=
"$"+(data.data.total_volume.usd/1e9).toFixed(2)+"B"

}

market()

</script>

</body>
</html>
